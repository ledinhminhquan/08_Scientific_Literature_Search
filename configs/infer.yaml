# Inference / serving config. Loaded via `scisearch --config configs/infer.yaml serve`.
project_title: Exploratory Scientific Literature Search System
author: Le Dinh Minh Quan

data:
  hf_corpus: gfissore/arxiv-abstracts-2021
  corpus_limit: 20000

search:
  top_k: 50
  final_k: 10
  rrf_k: 60
  use_bm25: true
  use_dense: true
  n_clusters: 5
  related_k: 5

reranker:
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k_rerank: 30
  enabled: true

agent:
  short_query_words: 3
  min_results: 3
  min_top_score: 0.30
  max_expand_attempts: 1
  rerank_margin: 0.05
  llm_fallback_enabled: false        # true + SCISEARCH_LLM_API_KEY => LLM query-understanding brain
  llm_model: claude-haiku-4-5-20251001

serving:
  model_version: v1
