# Training config for the dense retriever (sentence-transformers, MNRL).
# Loaded via `scisearch --config configs/train.yaml train`. Unknown keys are ignored.
project_title: Exploratory Scientific Literature Search System
author: Le Dinh Minh Quan
student_id: "23127460"

data:
  hf_corpus: gfissore/arxiv-abstracts-2021     # CC0; title+abstract+categories(list)+authors
  use_hf_corpus: true
  corpus_limit: 20000
  pairs_per_paper: 2
  max_train_pairs: 80000
  eval_queries: 2000
  seed: 42

model:
  base_model: BAAI/bge-small-en-v1.5           # fallback: sentence-transformers/all-MiniLM-L6-v2
  query_instruction: ""                        # bge s2p: "Represent this sentence for searching relevant passages: "
  max_seq_length: 256
  num_train_epochs: 1
  learning_rate: 2.0e-5
  per_device_train_batch_size: 128             # large => more in-batch negatives
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  fp16: false
  tf32: true
  eval_steps: 500
  save_steps: 500
  seed: 42

reranker:
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k_rerank: 30
  enabled: true
