name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core only — tests run download-free)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Compile-check
        run: python -m compileall -q src/scisearch
      - name: Run tests (CPU-only, no model downloads)
        run: pytest -q
      - name: Rubric self-check
        run: PYTHONPATH=src python -m scisearch.cli grade
